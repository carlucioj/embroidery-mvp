name: embroidery_mvp
description: Aplicação multiplataforma para converter imagens em arquivos de bordado.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # File handling
  path_provider: ^2.1.1
  file_picker: ^8.1.2
  image_picker: ^1.0.4

  # Networking
  http: ^1.1.0

  # Persistence
  shared_preferences: ^2.2.2

  # Utilities
  uuid: ^4.2.1
  path: ^1.9.0

  # Navigation
  go_router: ^13.0.0

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # BLoC testing
  bloc_test: ^9.1.5

  # Mocking
  mocktail: ^1.0.1

  # Linting
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/colors/madeira.json
    - assets/colors/isacord.json
    - assets/colors/brother.json

# objective_c 9.x tries to compile native assets on Windows (Flutter 3.41 bug).
# Pin path_provider_foundation to 2.4.0 which uses objective_c <9.0.
dependency_overrides:
  path_provider_foundation: 2.4.0
